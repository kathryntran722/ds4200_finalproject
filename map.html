<h2>Cancer–gene association studies by continent</h2>
<p class="sub">Hover over a continent to see the number of studies conducted there.</p>
<svg id="map"></svg>
<div id="tooltip"></div>

<script>
const W = 1000, H = 700;

const C = {
  12:'Africa',24:'Africa',72:'Africa',108:'Africa',120:'Africa',132:'Africa',140:'Africa',
  174:'Africa',175:'Africa',178:'Africa',180:'Africa',204:'Africa',226:'Africa',
  231:'Africa',232:'Africa',262:'Africa',266:'Africa',270:'Africa',288:'Africa',324:'Africa',
  384:'Africa',404:'Africa',426:'Africa',430:'Africa',434:'Africa',450:'Africa',
  454:'Africa',466:'Africa',478:'Africa',480:'Africa',504:'Africa',508:'Africa',516:'Africa',
  148:'Africa',562:'Africa',566:'Africa',624:'Africa',638:'Africa',646:'Africa',678:'Africa',686:'Africa',
  694:'Africa',706:'Africa',710:'Africa',716:'Africa',728:'Africa',729:'Africa',736:'Africa',
  748:'Africa',768:'Africa',788:'Africa',800:'Africa',818:'Africa',834:'Africa',854:'Africa',
  894:'Africa',
  4:'Asia',48:'Asia',50:'Asia',51:'Asia',64:'Asia',96:'Asia',104:'Asia',116:'Asia',
  156:'Asia',162:'Asia',268:'Asia',356:'Asia',360:'Asia',364:'Asia',368:'Asia',376:'Asia',
  392:'Asia',398:'Asia',400:'Asia',408:'Asia',410:'Asia',414:'Asia',418:'Asia',422:'Asia',
  458:'Asia',462:'Asia',496:'Asia',512:'Asia',524:'Asia',586:'Asia',608:'Asia',634:'Asia',
  682:'Asia',702:'Asia',704:'Asia',760:'Asia',762:'Asia',764:'Asia',784:'Asia',792:'Asia',
  795:'Asia',860:'Asia',887:'Asia',158:'Asia',
  8:'Europe',20:'Europe',40:'Europe',56:'Europe',70:'Europe',100:'Europe',112:'Europe',
  191:'Europe',203:'Europe',208:'Europe',233:'Europe',246:'Europe',250:'Europe',276:'Europe',
  292:'Europe',300:'Europe',336:'Europe',348:'Europe',352:'Europe',372:'Europe',380:'Europe',
  428:'Europe',438:'Europe',440:'Europe',442:'Europe',470:'Europe',492:'Europe',498:'Europe',
  499:'Europe',528:'Europe',578:'Europe',616:'Europe',620:'Europe',642:'Europe',643:'Europe',
  674:'Europe',688:'Europe',703:'Europe',705:'Europe',724:'Europe',752:'Europe',756:'Europe',
  804:'Europe',807:'Europe',826:'Europe',831:'Europe',832:'Europe',833:'Europe',744:'Europe',
  28:'North America',44:'North America',52:'North America',84:'North America',
  124:'North America',188:'North America',192:'North America',212:'North America',
  214:'North America',222:'North America',308:'North America',320:'North America',
  332:'North America',340:'North America',388:'North America',474:'North America',
  484:'North America',558:'North America',591:'North America',630:'North America',
  659:'North America',660:'North America',662:'North America',670:'North America',
  780:'North America',796:'North America',840:'North America',
  32:'South America',68:'South America',76:'South America',152:'South America',
  170:'South America',218:'South America',238:'South America',254:'South America',
  328:'South America',600:'South America',604:'South America',740:'South America',
  858:'South America',862:'South America',
  36:'Oceania',184:'Oceania',242:'Oceania',296:'Oceania',316:'Oceania',520:'Oceania',
  540:'Oceania',554:'Oceania',570:'Oceania',574:'Oceania',580:'Oceania',583:'Oceania',
  584:'Oceania',585:'Oceania',598:'Oceania',612:'Oceania',882:'Oceania',
};

const DATA_TO_KEY = {
  'Asia':'Asia','Europe':'Europe','North America':'North America',
  'Africa':'Africa','Middle East':'Asia','Australia':'Oceania','South America':'South America'
};

const DISPLAY = {
  'Asia':'Asia (incl. Middle East)','Europe':'Europe','North America':'North America',
  'Africa':'Africa','Oceania':'Australia','South America':'South America'
};

const svg = d3.select('#map').attr('width', W).attr('height', H);
const tooltip = d3.select('#tooltip');
const projection = d3.geoNaturalEarth1().scale(145).translate([W / 2, H / 2]);
const path = d3.geoPath().projection(projection);

Promise.all([
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'),
  d3.json('map_data.json')
]).then(([world, mapData]) => {

  const studiesByKey = {};
  const originalData = {};
  mapData.forEach(d => {
    originalData[d.continent] = d.studies;
    const key = DATA_TO_KEY[d.continent];
    if (key) studiesByKey[key] = (studiesByKey[key] || 0) + d.studies;
  });

  const maxVal = d3.max(Object.values(studiesByKey));
  const colorScale = d3.scaleSequential().domain([0, maxVal]).interpolator(d3.interpolateBlues);

  const countries = topojson.feature(world, world.objects.countries);

  svg.append('g')
    .selectAll('.country')
    .data(countries.features)
    .join('path')
    .attr('class', 'country')
    .attr('d', path)
    .attr('fill', d => {
      const key = C[+d.id];
      return key && studiesByKey[key] ? colorScale(studiesByKey[key]) : '#e8e8e8';
    })
    .on('mousemove', function(event, d) {
      const key = C[+d.id];
      if (!key || !studiesByKey[key]) {
        tooltip.style('opacity', 1)
          .style('left', (event.pageX + 14) + 'px')
          .style('top', (event.pageY - 32) + 'px')
          .html(`<span style="color:#aaa">No data</span>`);
        return;
      }
      let extra = '';
      if (key === 'Asia')
        extra = `<br><span style="color:#aaa;font-size:11px">Asia: ${originalData['Asia']||0} · Middle East: ${originalData['Middle East']||0}</span>`;
      tooltip.style('opacity', 1)
        .style('left', (event.pageX + 14) + 'px')
        .style('top', (event.pageY - 32) + 'px')
        .html(`<strong>${DISPLAY[key]||key}</strong><br>${studiesByKey[key]} studies${extra}`);
    })
    .on('mouseleave', () => tooltip.style('opacity', 0));

  const legendW = 200, legendH = 12;
  const legendX = W - legendW - 40, legendY = H - 50;
  const defs = svg.append('defs');
  const grad = defs.append('linearGradient').attr('id', 'legend-grad');
  grad.append('stop').attr('offset', '0%').attr('stop-color', colorScale(0));
  grad.append('stop').attr('offset', '100%').attr('stop-color', colorScale(maxVal));
  svg.append('rect').attr('x', legendX).attr('y', legendY)
    .attr('width', legendW).attr('height', legendH).attr('rx', 3).style('fill', 'url(#legend-grad)');
  svg.append('text').attr('class', 'legend-label').attr('x', legendX).attr('y', legendY - 6).text('Fewer studies');
  svg.append('text').attr('class', 'legend-label').attr('x', legendX + legendW).attr('y', legendY - 6).attr('text-anchor', 'end').text('More studies');
  svg.append('text').attr('class', 'legend-label').attr('x', legendX).attr('y', legendY + legendH + 14).text('0');
  svg.append('text').attr('class', 'legend-label').attr('x', legendX + legendW).attr('y', legendY + legendH + 14).attr('text-anchor', 'end').text(maxVal);
  svg.append('text').attr('x', legendX).attr('y', legendY - 18).attr('font-size', 12).attr('fill', '#888').text('Studies per continent');
});
</script>
</body>
</html>
